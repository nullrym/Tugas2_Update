<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jastip Choco.pop - Form Pemesanan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-cokelat shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">🍫 Choco.pop</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="katalog.html">Katalog</a></li>
                    <li class="nav-item"><a class="nav-link" href="cek-pesanan.html">Cek Pesanan</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html">Admin Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-cokelat text-white text-center py-3">
                        <h4 class="mb-0 fw-bold">Form Pemesanan</h4>
                    </div>
                    <div class="card-body p-4">
                        <p class="text-center text-muted mb-4">Silakan isi data diri Anda dengan lengkap untuk memproses pesanan.</p>

                        <form id="formPemesanan">
                            <div class="mb-3">
                                <label class="form-label fw-bold text-cokelat">Produk yang Dipilih</label>
                                <input type="text" class="form-control" id="produkTerpilih" name="produk" value="" readonly style="background-color: #f9f9f9;">
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold text-cokelat">Nama Lengkap</label>
                                <input type="text" class="form-control" name="nama" placeholder="Masukkan nama sesuai KTP/ID" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold text-cokelat">Nomor HP (WhatsApp)</label>
                                <input type="tel" class="form-control" name="whatsapp" placeholder="Contoh: 08123456789" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold text-cokelat">Alamat Pengiriman Lengkap</label>
                                <textarea class="form-control" name="alamat" rows="4" placeholder="Nama Jalan, No. Rumah, RT/RW, Kecamatan, Kota, Kode Pos" required></textarea>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold text-cokelat">Jumlah Barang</label>
                                <input type="number" class="form-control" name="jumlah" min="1" value="1" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold text-cokelat">Metode Pembayaran</label>
                                <select class="form-select" name="pembayaran" required>
                                    <option value="">-- Pilih Pembayaran --</option>
                                    <option value="transfer_bank">Transfer Bank (BCA/Mandiri/BNI)</option>
                                    <option value="e_wallet">E-Wallet (OVO/DANA/GoPay)</option>
                                    <option value="cod">Cash on Delivery (Khusus Area Banjarmasin)</option>
                                </select>
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-bold text-cokelat">Catatan Tambahan (Opsional)</label>
                                <input type="text" class="form-control" name="catatan" placeholder="Contoh: Versi Album, Pilihan Member, dll.">
                            </div>

                            <button type="submit" class="btn btn-custom w-100 py-3 fs-5">KIRIM PESANAN</button>
                        </form>
                    </div>
                </div>
                
                <p class="text-center mt-3">
                    <a href="katalog.html" class="text-cokelat text-decoration-none fw-bold">&larr; Kembali ke Katalog</a>
                </p>
            </div>
        </div>
    </div>

    <footer class="bg-cokelat text-white text-center py-4 mt-auto">
        <div class="container">
            <p class="mb-1"><strong>Lokasi:</strong> Banjarmasin | <strong>Telepon:</strong> 0813-4269-3459 | <strong>Sosmed:</strong> @Choco.pop</p>
            <small>&copy; 2026 Nuzulia Sekti Mahanania - NIM 2510817220006</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="jquery.js"></script>
    
    <script>
        $(document).ready(function() {
            const urlParams = new URLSearchParams(window.location.search);
            const namaProduk = urlParams.get('produk');

            if(namaProduk) {
                $('#produkTerpilih').val(namaProduk);
            } else {
                $('#produkTerpilih').val("Belum ada produk yang dipilih");
            }

            $('#formPemesanan').on('submit', function(e) {
                e.preventDefault();
                let namaPembeli = $('input[name="nama"]').val();
                let produkDibeli = $('#produkTerpilih').val();
                
                alert("Yeayy, Berhasil! 🎉\n\nPesanan atas nama " + namaPembeli + " berhasil diterima server.\nProduk yang dipesan: " + produkDibeli + ".\n\nData berhasil diproses.");
                
                this.reset();
                if(namaProduk) {
                    $('#produkTerpilih').val(namaProduk);
                }
            });
        });
    </script>
</body>
</html>
